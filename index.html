<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Stoutt Property Management</title>

<style>
:root{
--bg:#0f0b09;
--bg2:#171311;
--text:#f5f2eb;
--muted:#b8b0a6;
--gold:#c8a96a;
--line:rgba(255,255,255,.08);
}

*{box-sizing:border-box;margin:0;padding:0}
body{
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(180deg,var(--bg),var(--bg2));
color:var(--text);
}

.container{max-width:1200px;margin:auto;padding:24px}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 0;
border-bottom:1px solid var(--line);
}

.brand{
font-weight:bold;
letter-spacing:2px;
color:var(--gold);
}

.nav a{
margin-left:20px;
color:var(--muted);
text-decoration:none;
}

.hero{
padding:80px 0;
text-align:center;
}

.hero h1{
font-size:48px;
margin-bottom:20px;
}

.hero p{
color:var(--muted);
max-width:700px;
margin:auto;
}

.cta{
margin-top:40px;
}

.button{
padding:14px 24px;
border-radius:8px;
border:none;
cursor:pointer;
margin:10px;
}

.primary{background:var(--gold);color:#000;}
.secondary{background:none;border:1px solid var(--line);color:#fff;}

.footer{
text-align:center;
padding:60px 0;
border-top:1px solid var(--line);
margin-top:80px;
color:var(--muted);
}
</style>
</head>

<body>

<div class="container">

<header>
<div class="brand">STOUTT PROPERTY MANAGEMENT</div>
<div class="nav">
<a href="story.html">Story</a>
<a href="work.html">Work</a>
<a href="leadership.html">Leadership</a>
<a href="stewardship.html">Stewardship</a>
<a href="contact.html">Contact</a>
</div>
</header>

<section class="hero">
<h1>Let’s build something that lasts.</h1>
<p>
A lifetime of leadership, discipline, and vision — now focused on delivering
exceptional property management for communities that deserve more.
</p>

<div class="cta">
<a href="contact.html"><button class="button primary">Contact Glenn</button></a>
<a href="story.html"><button class="button secondary">Explore Story</button></a>
</div>
</section>

<div class="footer">
© Stoutt Property Management
</div>

</div>

</body>
</html>
